version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports: ["1433:1433"]

  api:
    build: ./src/EcommerceAPI
    ports: ["5000:80"]
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=EcommerceDB;User=sa;Password=Your_password123;TrustServerCertificate=true
    depends_on: [db]

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api]
